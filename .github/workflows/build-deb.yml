name: Build deb package

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build-deb:
    name: Build Ubuntu deb (${{ matrix.ubuntu }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        ubuntu: ["ubuntu:24.04"]

    container:
      image: ${{ matrix.ubuntu }}

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0   # needed for setuptools_scm version detection

      - name: Install build dependencies
        run: |
          apt-get update
          apt-get install -y --no-install-recommends \
            build-essential \
            debhelper \
            devscripts \
            dh-python \
            pybuild-plugin-pyproject \
            python3-all \
            python3-certbot \
            python3-pytest \
            python3-requests \
            python3-setuptools \
            python3-setuptools-scm

      - name: Build deb package
        run: dpkg-buildpackage -us -uc -b

      - name: Copy deb to workspace
        run: cp ../*.deb .

      - name: Upload deb artifact
        uses: actions/upload-artifact@v7
        with:
          name: deb-${{ matrix.ubuntu == 'ubuntu:24.04' && 'noble' || 'unknown' }}
          path: "*.deb"
          if-no-files-found: error

  create-release:
    name: Attach debs to GitHub Release
    needs: build-deb
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write

    steps:
      - name: Download all deb artifacts
        uses: actions/download-artifact@v8
        with:
          path: debs/
          merge-multiple: true

      - name: Create or update GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: debs/*.deb
